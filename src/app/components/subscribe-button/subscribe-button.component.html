<div class="subscribe-wrapper" *ngIf="shouldShow">
  <button
    type="button"
    class="subscribe-button"
    [class.subscribed]="localSubscribed"
    [class.loading]="loading"
    [ngClass]="buttonClass"
    [disabled]="loading"
    (click)="toggleSubscription()"
  >
    <span *ngIf="!loading">
      {{
        localSubscribed
          ? translationService.getTranslation('common.actions.unsubscribe')
          : translationService.getTranslation('common.actions.subscribe')
      }}
    </span>

    <span *ngIf="loading">
      {{ translationService.getTranslation('common.state.loading') }}...
    </span>
  </button>

  <span class="subscriber-count" *ngIf="showCount">
    {{ localTotalSubscribers }}
    {{ translationService.getTranslation('common.stats.subscribers') }}
  </span>

  <p class="subscribe-message" *ngIf="message">
    {{ message }}
  </p>

  <p class="subscribe-error" *ngIf="error">
    {{ error }}
  </p>
</div>
