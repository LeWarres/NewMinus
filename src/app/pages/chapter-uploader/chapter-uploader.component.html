<div class="chapter-uploader">
  <div class="uploader-card">
    <app-chapter-uploader-header
      [cargando]="cargando"
      [canAddLanguageVersion]="canAddLanguageVersion"
      [isArtworkWork]="isArtworkWork"
      [loadingWorkType]="loadingWorkType"
      [totalVersiones]="versiones.length"
      (addLanguageVersion)="agregarVersionIdioma()"
    ></app-chapter-uploader-header>

    <div class="auto-number-note">
      <strong>
        {{ translationService.getTranslation('chapterUploader.auto_number.title') }}
      </strong>

      <p>
        {{ translationService.getTranslation('chapterUploader.auto_number.description') }}
      </p>
    </div>

    @defer (on viewport) {
      <section class="language-versions">
        <app-chapter-version-card
          *ngFor="let version of versiones; let versionIndex = index; trackBy: trackByVersionUid"
          [version]="version"
          [versionIndex]="versionIndex"
          [versiones]="versiones"
          [idiomas]="idiomas"
          [cargando]="cargando"
          [maxPageFileSize]="maxPageFileSize"
          [isArtworkWork]="isArtworkWork"
          (removeVersion)="eliminarVersionIdioma($event)"
          (idiomaChange)="onIdiomaChange($event)"
          (filesSelected)="onVersionFilesSelected($event)"
          (pageRemoved)="onVersionPageRemove($event)"
        ></app-chapter-version-card>
      </section>
    } @placeholder {
      <section class="language-versions-placeholder" aria-hidden="true">
        <div class="placeholder-card"></div>
      </section>
    }

    @defer (on viewport) {
      <app-chapter-upload-summary
        *ngIf="versiones.length > 0"
        [totalVersiones]="versiones.length"
        [totalPagesCount]="totalPagesCount"
        [totalPagesSize]="totalPagesSize"
        [isArtworkWork]="isArtworkWork"
      ></app-chapter-upload-summary>
    } @placeholder {
      <div class="summary-placeholder" aria-hidden="true"></div>
    }

    <p *ngIf="respuesta" class="respuesta">
      {{ respuesta }}
    </p>

    <button
      type="button"
      class="submit-btn"
      (click)="subirCapitulo()"
      [disabled]="cargando"
    >
      {{
        cargando
          ? translationService.getTranslation('chapterUploader.submit.loading') + '...'
          : translationService.getTranslation('common.actions.upload_chapter')
      }}
    </button>
  </div>
</div>
