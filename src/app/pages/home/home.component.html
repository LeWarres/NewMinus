<div class="home-page">
  <section class="home-hero">
    <div class="hero-content">
      <div class="hero-banner-strip" *ngIf="heroBannerImages.length > 0">
        <a
          *ngFor="let image of heroBannerImages; let index = index; trackBy: trackByHeroBanner"
          class="hero-banner-link"
          [href]="image.href"
          [attr.aria-label]="image.alt"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="hero-banner-image"
            [src]="image.src"
            [alt]="image.alt"
            width="416"
            height="234"
            loading="eager"
            [attr.fetchpriority]="index === 0 ? 'high' : 'auto'"
            decoding="async"
          />
        </a>
      </div>
    </div>

    <button
      type="button"
      class="random-story-btn"
      (click)="discoverRandomStory()"
    >
      {{ discoverButtonLabel }}
    </button>
  </section>

  <section class="home-section recommended-section">
    <app-recommended-carousel
      [context]="'home'"
      (openObra)="abrirObra($event)"
      (openAutor)="abrirPerfilObra($event)"
      (viewMore)="verMasCategoriaRecomendada()"
      (recommendationsChange)="onRecommendationsChange($event)"
    ></app-recommended-carousel>
  </section>

  @defer (on viewport) {
    <app-home-work-carousel
      sectionClass="trending-section"
      titleKey="home.trending.title"
      descriptionKey="home.trending.description"
      cardLabelKey="home.trending.card_label"
      emptyKey="home.trending.empty"
      carouselId="populares-7-dias"
      [items]="obrasPopulares7Dias"
      [loading]="cargandoPopulares7Dias"
      [error]="errorPopulares7Dias"
      [viewMoreQueryParams]="{ orden: 'populares', idioma: 'preferidos' }"
      (openObra)="abrirObra($event)"
      (openAutor)="abrirPerfilObra($event)"
    ></app-home-work-carousel>
  } @placeholder {
    <section class="home-section deferred-placeholder">
      <div class="section-skeleton"></div>
    </section>
  }

  @defer (on viewport) {
    <app-home-work-carousel
      titleKey="home.newWorks.title"
      descriptionKey="home.newWorks.description"
      cardLabelKey="home.newWorks.card_label"
      emptyKey="home.newWorks.empty"
      carouselId="nuevas-obras"
      [items]="obrasNuevas"
      [loading]="cargandoObras"
      [error]="errorObras"
      (openObra)="abrirObra($event)"
      (openAutor)="abrirPerfilObra($event)"
    ></app-home-work-carousel>
  } @placeholder {
    <section class="home-section deferred-placeholder">
      <div class="section-skeleton"></div>
    </section>
  }

  @defer (on viewport) {
    <app-home-chapter-carousel
      titleKey="home.newChapters.title"
      descriptionKey="home.newChapters.description"
      loadingKey="home.newChapters.loading"
      emptyKey="home.newChapters.empty"
      carouselId="nuevos-capitulos"
      [items]="capitulosNuevos"
      [loading]="cargandoCapitulos"
      [error]="errorCapitulos"
      (openCapitulo)="abrirCapitulo($event)"
      (openAutor)="abrirPerfilCapitulo($event)"
    ></app-home-chapter-carousel>
  } @placeholder {
    <section class="home-section deferred-placeholder">
      <div class="section-skeleton"></div>
    </section>
  }

  @if (currentUser) {
    @defer (on viewport) {
      <app-home-chapter-carousel
        sectionClass="following-section"
        titleKey="common.labels.news"
        descriptionKey="home.following.description"
        loadingKey="home.following.loading"
        emptyKey="home.following.empty"
        carouselId="following-home"
        viewMoreRoute="/following"
        [items]="followingItems"
        [loading]="cargandoFollowing"
        [error]="errorFollowing"
        [showDescription]="false"
        (openCapitulo)="abrirCapitulo($event)"
        (openAutor)="abrirPerfilCapitulo($event)"
      ></app-home-chapter-carousel>
    } @placeholder {
      <section class="home-section deferred-placeholder">
        <div class="section-skeleton"></div>
      </section>
    }
  }
</div>
